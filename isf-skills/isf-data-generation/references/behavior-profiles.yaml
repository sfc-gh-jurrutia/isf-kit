# Shared Behavior Profiles and Reference Data
# Loaded by isf-data-generation to apply realistic behavioral patterns across entities.
# Source: industry_data_generator/_base.yaml

version: "1.0"
type: behavior_reference
description: "Cross-industry reference data for realistic data generation"

# Customer segment behavior profiles
# Applied as multipliers to base generation rates
segment_profiles:
  Premium:
    activity_multiplier: 1.5
    transaction_multiplier: 1.8
    avg_transaction_amount_multiplier: 2.0
    churn_probability: 0.05
  Enterprise:
    activity_multiplier: 1.3
    transaction_multiplier: 1.5
    avg_transaction_amount_multiplier: 3.0
    churn_probability: 0.03
  Standard:
    activity_multiplier: 1.0
    transaction_multiplier: 1.0
    avg_transaction_amount_multiplier: 1.0
    churn_probability: 0.15
  Budget:
    activity_multiplier: 0.7
    transaction_multiplier: 0.6
    avg_transaction_amount_multiplier: 0.5
    churn_probability: 0.25
  Student:
    activity_multiplier: 1.2
    transaction_multiplier: 0.4
    avg_transaction_amount_multiplier: 0.3
    churn_probability: 0.20
  Senior:
    activity_multiplier: 0.6
    transaction_multiplier: 0.8
    avg_transaction_amount_multiplier: 0.8
    churn_probability: 0.10

# Default generation ratios per customer
default_ratios:
  transactions_per_customer:
    quick: [3, 7]
    full: [8, 12]
  activities_per_customer:
    quick: [10, 20]
    full: [25, 35]

# Shared reference data distributions
# Used across all industries for common fields
reference_data:
  device_types:
    - value: web_desktop
      weight: 0.30
    - value: web_mobile
      weight: 0.35
    - value: ios_app
      weight: 0.15
    - value: android_app
      weight: 0.12
    - value: tablet
      weight: 0.05
    - value: smart_tv
      weight: 0.03

  payment_methods:
    - value: Credit Card
      weight: 0.45
    - value: PayPal
      weight: 0.20
    - value: Apple Pay
      weight: 0.15
    - value: Google Pay
      weight: 0.10
    - value: Bank Transfer
      weight: 0.05
    - value: Gift Card
      weight: 0.05

  referral_sources:
    - value: organic_search
      weight: 0.25
    - value: paid_search
      weight: 0.15
    - value: social_instagram
      weight: 0.12
    - value: social_facebook
      weight: 0.10
    - value: social_tiktok
      weight: 0.08
    - value: email_newsletter
      weight: 0.10
    - value: email_promotion
      weight: 0.05
    - value: direct
      weight: 0.10
    - value: referral
      weight: 0.05

  transaction_statuses:
    - value: COMPLETED
      weight: 0.92
    - value: PENDING
      weight: 0.05
    - value: FAILED
      weight: 0.02
    - value: REFUNDED
      weight: 0.01

  currencies:
    - value: USD
      weight: 0.70
    - value: EUR
      weight: 0.15
    - value: GBP
      weight: 0.08
    - value: CAD
      weight: 0.04
    - value: AUD
      weight: 0.03

# Batch processing defaults
batch_size: 10000
quick_mode_customer_limit: 10000
