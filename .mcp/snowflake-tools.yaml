# Snowflake MCP Server Configuration
# Official Server: https://github.com/Snowflake-Labs/mcp
#
# Copy this file to ~/.mcp/snowflake-tools.yaml
# Reference in mcp.json: "--service-config-file", "/Users/<username>/.mcp/snowflake-tools.yaml"

# Cortex Agent services (add your agent services here when ready)
agent_services: []

# Cortex Search services (add your search services here when ready)
search_services: []

# Cortex Analyst semantic models/views
# Uncomment and configure when you have semantic models set up
# analyst_services:
#   - service_name: "sales_analyst"
#     semantic_model: "@DATABASE.SCHEMA.STAGE/semantic_model.yaml"
#     description: "Natural language queries for your data"

# Other services - enabled by default for basic Snowflake operations
other_services:
  object_manager: True    # Manage Snowflake objects (create, drop, update, etc.)
  query_manager: True     # Execute SQL queries
  semantic_manager: True  # Discover and query Semantic Views

# SQL statement permissions - control what SQL operations are allowed
# Default: Read-only (SELECT, DESCRIBE, USE only)
# Change to True if your role requires write access
sql_statement_permissions:
  Alter: False
  Command: False
  Comment: False
  Commit: False
  Create: False
  Delete: False
  Describe: True      # Allow - view object definitions
  Drop: False
  Insert: False
  Merge: False
  Rollback: False
  Select: True        # Allow - read data
  Transaction: False
  TruncateTable: False
  Unknown: False
  Update: False
  Use: True           # Allow - switch context
