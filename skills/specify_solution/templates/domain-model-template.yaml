# Domain Model Template
# Generated by /speckit.specify
# This file defines the data entities, relationships, and generation parameters
# Supports medallion architecture (bronze, silver, gold layers)

metadata:
  name: "{demo_slug}"
  industry: "{industry}"
  created: "{date}"
  
  # Data generation parameters
  scale: "{minimal|realistic|scale_test}"
  time_range:
    start: "{start_date}"
    end: "{end_date}"
  seed: 42  # For reproducible generation
  
  # Medallion architecture settings
  medallion:
    enabled: true
    schemas:
      bronze: "BRONZE"   # Raw data schema
      silver: "SILVER"   # Cleansed data schema
      gold: "GOLD"       # Business-ready schema

# =============================================================================
# BRONZE LAYER - Raw Data
# =============================================================================
# Bronze entities contain raw data as-is from source:
# - May contain nulls, duplicates, format inconsistencies
# - Preserves source fidelity
# - Minimal transformations

entities:
  # ---------------------------
  # Bronze Layer Entities
  # ---------------------------
  - name: "raw_{entity_name}"
    description: "Raw {entity} data from source system"
    layer: "bronze"
    row_count: {number}
    
    # Bronze-specific configuration
    layer_config:
      null_rate: 0.05        # 5% of fields may be NULL
      duplicate_rate: 0.02   # 2% duplicate records
      format_errors: true    # Include format inconsistencies
      raw_timestamps: true   # Varied timestamp formats
    
    fields:
      - name: "{field_name}"
        type: "STRING"  # Keep as STRING in bronze, cast in silver
        description: "{Field description}"
        nullable: true
        
      - name: "_source_system"
        type: "STRING"
        description: "Source system identifier"
        generator:
          type: "enum"
          values: ["SYSTEM_A", "SYSTEM_B", "MANUAL_ENTRY"]
          
      - name: "_load_timestamp"
        type: "STRING"  # Raw timestamp, varied formats
        description: "When record was loaded"
        generator:
          type: "raw_timestamp"
          formats: ["ISO8601", "US_DATE", "EPOCH"]

  # ---------------------------
  # Silver Layer Entities
  # ---------------------------
  - name: "{entity_name}"
    description: "Cleansed and conformed {entity} data"
    layer: "silver"
    row_count: {number}  # Same as bronze after dedup
    
    # Silver-specific configuration
    layer_config:
      deduplicate: true          # Remove duplicates from bronze
      standardize_nulls: true    # Convert empty strings to NULL
      cast_types: true           # Cast to proper types
      validate_refs: true        # Validate foreign key references
      source_entity: "raw_{entity_name}"  # Bronze source
    
    fields:
      - name: "{field_name}"
        type: "{STRING|NUMBER|DATE|TIMESTAMP|BOOLEAN|DECIMAL|VARIANT}"
        description: "{Field description}"
        nullable: false
        primary_key: true
        
      - name: "{field_name}"
        type: "TIMESTAMP"  # Properly typed
        description: "{Field description}"
        nullable: true
        foreign_key: "{other_entity.field}"
        
      - name: "_valid_from"
        type: "TIMESTAMP"
        description: "SCD2 validity start"
        
      - name: "_valid_to"
        type: "TIMESTAMP"
        description: "SCD2 validity end"
        nullable: true

  # ---------------------------
  # Gold Layer Entities
  # ---------------------------
  
  # Dimension table example
  - name: "dim_{entity_name}"
    description: "Dimension table for {entity}"
    layer: "gold"
    row_count: {number}
    
    layer_config:
      is_aggregate: false
      source_entities: ["{entity_name}"]
    
    fields:
      - name: "{entity}_key"
        type: "NUMBER"
        description: "Surrogate key"
        primary_key: true
        generator:
          type: "sequence"
          
      - name: "{entity}_id"
        type: "STRING"
        description: "Natural/business key"
        
      - name: "{attribute}"
        type: "STRING"
        description: "{Attribute description}"

  # Fact table example
  - name: "fact_{entity_name}"
    description: "Fact table for {entity} metrics"
    layer: "gold"
    row_count: {number}
    
    layer_config:
      is_aggregate: true
      source_entities: ["{silver_entity1}", "{silver_entity2}"]
      grain: ["date_key", "customer_key", "product_key"]
      measures: ["quantity", "amount", "count"]
    
    fields:
      - name: "date_key"
        type: "NUMBER"
        foreign_key: "dim_date.date_key"
        
      - name: "{dimension}_key"
        type: "NUMBER"
        foreign_key: "dim_{dimension}.{dimension}_key"
        
      - name: "{measure}_amount"
        type: "DECIMAL"
        description: "Sum of {measure}"
        generator:
          type: "aggregate"
          function: "SUM"
          source_field: "{source_entity}.{field}"
          
      - name: "{measure}_count"
        type: "NUMBER"
        description: "Count of {measure}"
        generator:
          type: "aggregate"
          function: "COUNT"

  # Aggregate/summary table example
  - name: "agg_{entity_name}_daily"
    description: "Daily aggregation of {entity}"
    layer: "gold"
    row_count: {number}  # One per day per grain
    
    layer_config:
      is_aggregate: true
      source_entities: ["fact_{entity_name}"]
      grain: ["date_key"]
      time_grain: "day"
      measures: ["total_amount", "total_count", "avg_amount"]
    
    fields:
      - name: "date_key"
        type: "NUMBER"
        foreign_key: "dim_date.date_key"
        primary_key: true
        
      - name: "total_{measure}"
        type: "DECIMAL"
        generator:
          type: "aggregate"
          function: "SUM"
          
      - name: "avg_{measure}"
        type: "DECIMAL"
        generator:
          type: "aggregate"
          function: "AVG"

# =============================================================================
# Relationships
# =============================================================================
relationships:
  # Bronze to Silver (derivation)
  - name: "bronze_to_silver_{entity}"
    from: "raw_{entity}.id"
    to: "{entity}.id"
    type: "derivation"
    
  # Silver to Gold (transformation)
  - name: "silver_to_dim_{entity}"
    from: "{entity}.id"
    to: "dim_{entity}.{entity}_id"
    type: "derivation"
    
  # Within Gold (star schema)
  - name: "fact_to_dim_{entity}"
    from: "fact_{transactions}.{entity}_key"
    to: "dim_{entity}.{entity}_key"
    type: "many-to-one"

# =============================================================================
# Data Characteristics
# =============================================================================
characteristics:
  anomalies:
    enabled: false
    rate: 0.02
    types: ["spike", "drop", "outlier"]
    # Apply to specific layers
    layers: ["bronze", "silver"]  # Gold should be clean
      
  seasonality:
    enabled: false
    patterns:
      - type: "day_of_week"
        peak_days: [1, 2, 3, 4, 5]
        trough_days: [6, 7]
        
  trends:
    enabled: false
    direction: "up"
    strength: 0.1
    
  missing_data:
    enabled: false
    rate: 0.05
    pattern: "random"
    layers: ["bronze"]  # Only in bronze, silver/gold are cleansed

# =============================================================================
# Industry Configuration
# =============================================================================
industry_config:
  terminology: "{medical|financial|retail|industrial|energy|media|tech}"
  
  pii_fields:
    - "{entity.field}"
    
  compliance:
    - "HIPAA_aware"
    - "PCI_aware"
    - "GDPR_aware"

# =============================================================================
# Medallion Transform Definitions
# =============================================================================
# These define how data flows between layers

transforms:
  bronze_to_silver:
    - name: "cleanse_{entity}"
      source: "raw_{entity}"
      target: "{entity}"
      operations:
        - type: "deduplicate"
          key: ["id"]
        - type: "cast"
          field: "created_at"
          from_type: "STRING"
          to_type: "TIMESTAMP"
        - type: "standardize_null"
          fields: ["*"]
          empty_string_to_null: true
        - type: "validate_fk"
          field: "customer_id"
          reference: "customer.id"
          
  silver_to_gold:
    - name: "build_dim_{entity}"
      source: "{entity}"
      target: "dim_{entity}"
      operations:
        - type: "add_surrogate_key"
          name: "{entity}_key"
        - type: "select"
          fields: ["id", "name", "category", "status"]
          
    - name: "build_fact_{entity}"
      sources: ["{entity1}", "{entity2}"]
      target: "fact_{entity}"
      operations:
        - type: "join"
          left: "{entity1}"
          right: "{entity2}"
          on: "{entity1}.id = {entity2}.{entity1}_id"
        - type: "aggregate"
          group_by: ["date_key", "customer_key"]
          measures:
            - field: "amount"
              function: "SUM"
              alias: "total_amount"
