# Sample Questions Template
# Generated by /speckit.specify
# These questions drive semantic model verification and demo validation

metadata:
  demo: "{demo_slug}"
  created: "{date}"
  total_questions: {count}

questions:
  # Priority 1 - Must work flawlessly in demo
  - id: "q1"
    text: "{Natural language question exactly as user would ask}"
    priority: "P1"
    user_story: "US1"
    
    # Expected behavior
    expected:
      result_type: "single_value"  # single_value | table | chart | text
      columns: ["count"]
      sample_answer: "1,234"
      
    # SQL pattern for validation (not exact SQL)
    sql_pattern: |
      SELECT COUNT(DISTINCT {field})
      FROM {table}
      WHERE {conditions}
      
    # Semantic model entities involved
    entities:
      - "{entity_name}"
      
    # Tags for categorization
    tags:
      - "count"
      - "aggregate"
    
    # Visualization recommendation (populated during /speckit.plan)
    visualization:
      recommended_chart: "KPICard"  # From visualization-matrix.md
      chart_rationale: "Single aggregate value, best shown as KPI"
      threshold: null  # If set, use CrisisKPI instead
      notes: ""

  - id: "q2"
    text: "{Question with breakdown/grouping}"
    priority: "P1"
    user_story: "US1"
    
    expected:
      result_type: "table"
      columns: ["dimension", "metric"]
      row_count_range: [5, 20]
      
    sql_pattern: |
      SELECT {dimension}, SUM({metric})
      FROM {table}
      GROUP BY {dimension}
      ORDER BY 2 DESC
      
    entities:
      - "{entity_name}"
      
    tags:
      - "breakdown"
      - "group_by"
    
    visualization:
      recommended_chart: "BarChart"  # or HorizontalBarChart if >5 categories
      chart_rationale: "Categorical breakdown, comparison across groups"
      threshold: null
      notes: "Switch to HorizontalBarChart if labels are long"

  - id: "q3"
    text: "{Question with time comparison}"
    priority: "P1"
    user_story: "US2"
    
    expected:
      result_type: "chart"
      chart_type: "line"
      columns: ["date", "metric"]
      
    sql_pattern: |
      SELECT DATE_TRUNC('month', {date_field}), SUM({metric})
      FROM {table}
      GROUP BY 1
      ORDER BY 1
      
    entities:
      - "{entity_name}"
      
    tags:
      - "trend"
      - "time_series"
    
    visualization:
      recommended_chart: "LineChart"
      chart_rationale: "Time series data, showing trend over time"
      threshold: null
      notes: "Use AreaChart if showing cumulative/stacked metrics"

  # Priority 2 - Should work, nice to have
  - id: "q4"
    text: "{More complex question}"
    priority: "P2"
    user_story: "US2"
    
    expected:
      result_type: "table"
      columns: ["entity", "metric1", "metric2"]
      
    sql_pattern: |
      SELECT {fields}
      FROM {table1}
      JOIN {table2} ON ...
      WHERE {conditions}
      
    entities:
      - "{entity1}"
      - "{entity2}"
      
    tags:
      - "join"
      - "multi_entity"
    
    visualization:
      recommended_chart: "DataTable"
      chart_rationale: "Multi-column result, best as interactive table"
      threshold: null
      notes: "Add sorting and filtering for exploration"

  # Follow-up questions (test conversation context)
  - id: "q5"
    text: "{Follow-up that requires context from previous question}"
    priority: "P2"
    user_story: "US1"
    requires_context: true
    follows: "q2"
    
    expected:
      result_type: "table"
      
    tags:
      - "follow_up"
      - "context"
    
    visualization:
      recommended_chart: null  # Inherits from parent or dynamic
      chart_rationale: "Context-dependent, may reuse parent visualization"
      threshold: null
      notes: ""

# Validation rules
validation:
  # All P1 questions must pass for demo to be ready
  p1_pass_rate: 1.0
  
  # P2 questions are best-effort
  p2_pass_rate: 0.8
  
  # Maximum acceptable latency
  max_latency_seconds: 5
  
  # Questions should return results (not errors)
  require_results: true

# Question categories for coverage tracking
categories:
  aggregations:
    questions: ["q1"]
    coverage: "required"
    default_chart: "KPICard"
    
  breakdowns:
    questions: ["q2"]
    coverage: "required"
    default_chart: "BarChart"
    
  trends:
    questions: ["q3"]
    coverage: "required"
    default_chart: "LineChart"
    
  joins:
    questions: ["q4"]
    coverage: "optional"
    default_chart: "DataTable"
    
  follow_ups:
    questions: ["q5"]
    coverage: "optional"
    default_chart: null

# Visualization summary (populated during /speckit.plan)
visualization_summary:
  page_template: null  # ExecutiveDashboard | ChatAnalytics | DataExplorer
  industry_theme: null  # retail | finance | healthcare | technology
  persona_accent: null  # executive | analyst | operations
  charts_used:
    - chart_type: null
      count: 0
  executive_components:
    technical_metadata: false
    crisis_kpi: false
    skeleton_loaders: false
